const mapDiv = document.getElementById("map");

mapDiv.on('plotly_click', function(eventData) {

    const country = eventData.points[0].hovertext;

    // =====================================================
    // MAIN TECHNOLOGY CHART
    // =====================================================

    const rows = MAIN_DATA
        .filter(r => r.Country === country)
        .sort((a,b) => b.Frequency - a.Frequency);

    const techs = rows.map(r => r.Technology);
    const freqs = rows.map(r => r.Frequency);

    Plotly.react(
        "mainbar",
        [{
            x: techs,
            y: freqs,
            type: "bar",
            marker: {
                color: freqs,
                colorscale: "Viridis"
            }
        }],
        {
            title: country + " - Technology Frequency",
            height: 500
        }
    );

    // =====================================================
    // TOKEN CHARTS
    // =====================================================

    const container = document.getElementById(
        "tokenChartsContainer"
    );

    container.innerHTML = "";

    // Country token rows
    const tokenRows = TOKEN_DATA.filter(
        r => r.Country === country
    );

    // Unique technologies
    const uniqueTechs = [
        ...new Set(
            tokenRows.map(r => r.Technology)
        )
    ];

    uniqueTechs.forEach((tech, idx) => {

        const techRows = tokenRows
            .filter(r => r.Technology === tech)
            .sort((a,b) => b.Frequency - a.Frequency);

        // Eğer filtre sonrası veri kalmadıysa skip
        if (techRows.length === 0) {
            return;
        }

        const tokens = techRows.map(r => r.Token);
        const frequencies = techRows.map(r => r.Frequency);

        // Create chart div
        const div = document.createElement("div");

        div.id = "token_chart_" + idx;

        div.className = "token-chart";

        container.appendChild(div);

        Plotly.newPlot(
            div.id,
            [{
                x: tokens,
                y: frequencies,
                type: "bar",
                marker: {
                    color: frequencies,
                    colorscale: "Plasma"
                }
            }],
            {
                title: tech + " - Token Frequency",
                height: 450,
                margin: {
                    t: 50
                },
                xaxis: {
                    title: "Token"
                },
                yaxis: {
                    title: "Frequency"
                }
            }
        );

    });

});
